const snaps = (DB.snapshots || []).slice().sort((a, b) => a.date < b.date ? -1 : 1);

// 최근 7일 컬럼 (오늘 포함)
const days = [];
{
  const base = new Date(today + "T00:00:00");
  for (let i = 6; i >= 0; i--) days.push(dstr(new Date(base.getTime() - i * 86400000)));
}
const nextDay = (d) => dstr(new Date(new Date(d + "T00:00:00").getTime() + 86400000));

// 그날 하루 스트리밍 (오늘은 현재까지)
function dailyOf(id, d) {
  const a = byDate[d]?.stats?.[id]?.views;
  if (a == null) return null;
  const b = d === today ? DB.current?.stats?.[id]?.views : byDate[nextDay(d)]?.stats?.[id]?.views;
  return b == null ? null : b - a;
}

// 어제 차트 순위 (순위 변동 표시용)
const ydate = dstr(new Date(new Date(today + "T00:00:00").getTime() - 86400000));
const yRank = Object.fromEntries((DB.chartDates?.[ydate] || []).map((e) => [e.id, e.pos]));
const hasYesterday = (DB.chartDates?.[ydate] || []).length > 0;

document.getElementById("updated").innerHTML =
  "업데이트: " + (DB.current?.time || "-") + " · 추적 " + Object.keys(DB.videos || {}).length + "곡";

function headRow(withRank) {
  return "<tr>" + (withRank ? '<th class="rank">순위</th>' : "") + '<th class="song">곡</th>' +
    days.map((d) => "<th>" + d.slice(5).replace("-", "/") + (d === today ? "<br>오늘(현재)" : "") + "</th>").join("") +
    "<th>총 조회수</th></tr>";
}

function bodyRow(id, pos) {
  const v = DB.videos[id] || {};
  const cells = days.map((d) => {
    const n = dailyOf(id, d);
    const cls = d === today ? "today" : (n == null ? "zero" : "");
    return '<td class="' + cls + '">' + fmt(n) + "</td>";
  }).join("");
  let rank = "";
  if (pos != null) {
    let move = "";
    if (hasYesterday) {
      const y = yRank[id];
      if (y == null) move = '<span class="rankmove new">NEW</span>';
      else if (y > pos) move = '<span class="rankmove up">▲' + (y - pos) + "</span>";
      else if (y < pos) move = '<span class="rankmove down">▼' + (pos - y) + "</span>";
      else move = '<span class="rankmove zero">–</span>';
    }
    rank = '<td class="rank"><b>' + pos + "</b>" + move + "</td>";
  }
  const total = DB.current?.stats?.[id]?.views;
  return '<tr class="' + (OWN.has(id) ? "mine" : "") + '">' + rank +
    '<td class="song"><a href="https://youtu.be/' + id + '" target="_blank">' + (v.title || id) + "</a>" +
    '<span class="artist">' + (v.artist || "") + (v.release ? " · " + v.release + " 발매" : "") + "</span></td>" +
    cells + "<td>" + fmt(total) + "</td></tr>";
}

const dropped = Object.keys(DB.videos || {}).filter((id) => !onChart.has(id))

if (dropped.length) {
  document.getElementById("droppedPanel").style.display = "";
  document.getElementById("droppedWrap").innerHTML =
    "<table><thead>" + headRow(false) + "</thead><tbody>" +
    dropped.map((id) => bodyRow(id, null)).join("") + "</tbody></table>";
}
